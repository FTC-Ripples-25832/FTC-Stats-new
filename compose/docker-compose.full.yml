services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ftcscoutuser
      POSTGRES_PASSWORD: ftcscoutpassword
      POSTGRES_DB: ftcscoutdb
    volumes:
      - ftcstats-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ..
      dockerfile: packages/server/Dockerfile
    environment:
      FTC_API_KEY: ${FTC_API_KEY:-}
      FTC_API_KEY_RAW: ${FTC_API_KEY_RAW:-}
      DATABASE_URL: postgres://ftcscoutuser:ftcscoutpassword@db:5432/ftcscoutdb
      PORT: 8080
      LOGGING: 0
      SYNC_DB: 1
      SYNC_API: ${SYNC_API:-0}
      CACHE_REQ: 0
      FRONTEND_CODE: ftcstats-dev
      DB_TIMEOUT: 5000
      EPA_SERVICE_URL: http://epa:8001
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:8080"

  epa:
    build:
      context: ..
      dockerfile: packages/epa/Dockerfile
    environment:
      DATABASE_URL: postgres://ftcscoutuser:ftcscoutpassword@db:5432/ftcscoutdb
      EPA_PORT: 8001
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8001:8001"

  web:
    build:
      context: ..
      dockerfile: packages/web/Dockerfile
    environment:
      PORT: 3000
      PUBLIC_SERVER_ORIGIN: server:8080
      PUBLIC_SERVER_SECURE: "0"
      PUBLIC_BROWSER_SERVER_ORIGIN: localhost:4000
      PUBLIC_FRONTEND_CODE: ftcstats-dev
    depends_on:
      - server
    ports:
      - "3000:3000"

volumes:
  ftcstats-db:
