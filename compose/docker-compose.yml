services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ftcscoutuser
      POSTGRES_PASSWORD: ftcscoutpassword
      POSTGRES_DB: ftcscoutdb
    ports:
      - "5432:5432"
    volumes:
      - ftcstats-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ftcstats-db:
