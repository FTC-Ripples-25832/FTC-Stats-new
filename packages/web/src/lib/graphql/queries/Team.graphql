query Team($number: Int!, $season: Int!, $seasons: [Int!]!) {
    teamByNumber(number: $number) {
        name
        number
        website
        name
        location {
            city
            state
            country
        }
        schoolName
        sponsors
        rookieYear
        quickStats(season: $season) {
            tot {
                value
                rank
            }
            auto {
                value
                rank
            }
            dc {
                value
                rank
            }
            eg {
                value
                rank
            }
            count
        }
        locationQuickStats(season: $season) {
            world {
                tot {
                    value
                    rank
                }
                count
            }
            country {
                tot {
                    value
                    rank
                }
                count
            }
            state {
                tot {
                    value
                    rank
                }
                count
            }
            district {
                tot {
                    value
                    rank
                }
                count
            }
        }
        quickStatsBySeason(seasons: $seasons) {
            season
            tot {
                value
                rank
            }
            count
        }
        events(season: $season) {
            season
            eventCode
            teamNumber
            stats {
                __typename
                ...TeamPageStats
            }
            awards {
                season
                eventCode
                teamNumber
                type
                placement
                personName
            }
            event {
                ...BasicEventInfo
            }
            matches {
                season
                eventCode
                matchId
                station
                alliance
                match {
                    ...FullMatch
                }
            }
        }
    }
}
